version: '3.8'

services:
  flask-ai-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustai-flask-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - FLASK_PORT=5000
      - GUNICORN_WORKERS=4
      - PYTHONUNBUFFERED=1
    volumes:
      - /tmp:/tmp  # For temporary file uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - trustai-network
    labels:
      - "com.trustai.service=flask-api"
      - "com.trustai.version=1.0.0"

networks:
  trustai-network:
    driver: bridge
